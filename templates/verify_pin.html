<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Verify PIN - Zoro Pay</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
      }
      body {
        background: radial-gradient(circle at 30% 10%, #0a0a0f, #000);
        font-family: "Inter", sans-serif;
        color: white;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .container {
        max-width: 480px;
        width: 100%;
      }
      .glass-card {
        background: rgba(18, 18, 28, 0.8);
        backdrop-filter: blur(16px);
        border-radius: 2rem;
        padding: 2rem;
        border: 1px solid rgba(79, 70, 229, 0.4);
        margin-bottom: 20px;
      }
      .txn-summary {
        background: #0f0f17;
        border-radius: 1.5rem;
        padding: 1.2rem;
        margin-bottom: 1.5rem;
      }
      .summary-row {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid #26263a;
      }
      .amount {
        font-size: 1.5rem;
        font-weight: bold;
        color: #a78bfa;
      }
      .external-badge {
        background: #2d1f4e;
        color: #a78bfa;
        padding: 4px 8px;
        border-radius: 12px;
        font-size: 0.7rem;
        margin-left: 8px;
      }
      .pin-header {
        text-align: center;
        margin-bottom: 1.8rem;
      }
      .pin-header i {
        font-size: 3rem;
        color: #4f46e5;
        margin-bottom: 12px;
      }
      .pin-dots {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin: 30px 0;
      }
      .pin-dot {
        width: 16px;
        height: 16px;
        background: #2d2d44;
        border-radius: 50%;
        transition: 0.2s;
      }
      .pin-dot.filled {
        background: #4f46e5;
        transform: scale(1.2);
        box-shadow: 0 0 8px #4f46e5;
      }
      .keypad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 24px;
      }
      .keypad-btn {
        background: #1e1e2c;
        border: none;
        padding: 18px;
        border-radius: 60px;
        font-size: 1.5rem;
        font-weight: 600;
        color: white;
        cursor: pointer;
        transition: 0.1s;
      }
      .keypad-btn:active {
        background: #4f46e5;
        transform: scale(0.96);
      }
      .action-buttons {
        display: flex;
        gap: 12px;
        margin-top: 20px;
      }
      .btn {
        flex: 1;
        padding: 14px;
        border-radius: 2rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
      }
      .btn-primary {
        background: linear-gradient(95deg, #4f46e5, #6366f1);
        color: white;
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-secondary {
        background: #1e1e2c;
        color: #cbd5e1;
        border: 1px solid #4f46e5;
      }
      .forgot-link {
        text-align: center;
        margin-top: 20px;
        font-size: 0.75rem;
        color: #9ca3af;
      }
      .warning-banner {
        background: rgba(245, 158, 11, 0.1);
        border: 1px solid rgba(245, 158, 11, 0.3);
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 16px;
        font-size: 0.8rem;
        color: #fbbf24;
        text-align: center;
      }
      @media (max-width: 480px) {
        .glass-card {
          padding: 1.5rem;
        }
        .keypad-btn {
          padding: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="glass-card">
        <div class="txn-summary" id="txnSummary">Loading transaction...</div>
        <div class="pin-header">
          <i class="fas fa-lock"></i>
          <h3>Enter Transaction PIN</h3>
          <p style="color: #9ca3af; font-size: 0.8rem">Secure 4/6 digit PIN</p>
        </div>
        <div class="pin-dots" id="pinDots"></div>
        <div class="keypad" id="keypad"></div>
        <div class="action-buttons">
          <button class="btn btn-secondary" onclick="cancelTransaction()">Cancel</button>
          <button class="btn btn-primary" id="confirmBtn" disabled>Confirm</button>
        </div>
        <div class="forgot-link">
          <a href="/settings" style="color: #818cf8">Forgot PIN? Change in settings</a>
        </div>
      </div>
    </div>
    <script>
      let currentPin = "",
        pinLength = 4,
        txnData = null,
        isExternalRecipient = false;

      function loadTransaction() {
        const stored = sessionStorage.getItem("pendingTransaction");
        if (!stored) {
          window.location = "/dashboard";
          return;
        }
        txnData = JSON.parse(stored);
        
        // Check if recipient is external (non-Zoro Pay user)
        // This would be set by the send page when recipient is not found in system
        isExternalRecipient = txnData.is_external || false;
        
        // Build transaction summary HTML
        let summaryHtml = `
          <div class="summary-row">
            <span>Recipient:</span>
            <strong>${escapeHtml(txnData.identifier || txnData.phone)}</strong>
            ${isExternalRecipient ? '<span class="external-badge"><i class="fas fa-external-link-alt"></i> Non-Zoro User</span>' : ''}
          </div>
          <div class="summary-row">
            <span>Amount:</span>
            <span class="amount">₹${parseFloat(txnData.amount).toFixed(2)}</span>
          </div>
        `;
        
        // Add note if present
        if (txnData.note) {
          summaryHtml += `
            <div class="summary-row">
              <span>Note:</span>
              <span>${escapeHtml(txnData.note)}</span>
            </div>
          `;
        }
        
        // Add warning for external recipients
        if (isExternalRecipient) {
          summaryHtml += `
            <div class="warning-banner">
              <i class="fas fa-info-circle"></i> 
              This user is not registered with Zoro Pay. They will receive an SMS invitation to download the app and claim the money.
            </div>
          `;
        }
        
        document.getElementById("txnSummary").innerHTML = summaryHtml;
        fetchPinLength();
      }
      
      async function fetchPinLength() {
        try {
          const u = await fetch("/api/user");
          const user = await u.json();
          pinLength = user.pin_length || 4;
          initUI();
        } catch (e) {
          pinLength = 4;
          initUI();
        }
      }
      
      function initUI() {
        const dotsDiv = document.getElementById("pinDots");
        dotsDiv.innerHTML = "";
        for (let i = 0; i < pinLength; i++)
          dotsDiv.innerHTML += '<div class="pin-dot"></div>';
        generateKeypad();
      }
      
      function generateKeypad() {
        const keys = [
          "1", "2", "3",
          "4", "5", "6",
          "7", "8", "9",
          '<i class="fas fa-backspace"></i>',
          "0",
          '<i class="fas fa-check"></i>',
        ];
        const pad = document.getElementById("keypad");
        pad.innerHTML = "";
        keys.forEach((k) => {
          const btn = document.createElement("button");
          btn.className = "keypad-btn";
          btn.innerHTML = k;
          btn.onclick = () => handleKey(k);
          pad.appendChild(btn);
        });
      }
      
      function handleKey(val) {
        if (val === '<i class="fas fa-backspace"></i>') {
          currentPin = currentPin.slice(0, -1);
          updateDots();
        } else if (val === '<i class="fas fa-check"></i>') {
          if (currentPin.length === pinLength) confirmTransaction();
        } else if (currentPin.length < pinLength) {
          currentPin += val;
          updateDots();
        }
        document.getElementById("confirmBtn").disabled = currentPin.length !== pinLength;
      }
      
      function updateDots() {
        const dots = document.querySelectorAll(".pin-dot");
        for (let i = 0; i < dots.length; i++) {
          if (i < currentPin.length) dots[i].classList.add("filled");
          else dots[i].classList.remove("filled");
        }
      }
      
      async function confirmTransaction() {
        const btn = document.getElementById("confirmBtn");
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing';
        
        try {
          // Send to the same API endpoint - it handles both registered and external users
          const res = await fetch("/api/send_money", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              phone: txnData.identifier || txnData.phone,
              amount: parseFloat(txnData.amount),
              note: txnData.note || "",
              pin: currentPin,
            }),
          });
          
          const data = await res.json();
          
          if (res.ok) {
            sessionStorage.setItem(
              "lastSuccessMeta",
              JSON.stringify({
                transaction_id: data.transaction_id,
                cashback: data.cashback || 0,
                amount: txnData.amount,
                recipient: txnData.identifier || txnData.phone,
                is_external: data.is_external || false,
              }),
            );
            sessionStorage.removeItem("pendingTransaction");
            window.location.href = "/success";
          } else {
            alert(data.error || "Transaction failed");
            reset();
          }
        } catch (e) {
          console.error("Transaction error:", e);
          alert("Network error. Please check your connection and try again.");
          reset();
        }
      }
      
      function reset() {
        currentPin = "";
        updateDots();
        const confirmBtn = document.getElementById("confirmBtn");
        confirmBtn.disabled = true;
        confirmBtn.innerHTML = "Confirm";
      }
      
      function cancelTransaction() {
        if (confirm("Are you sure you want to cancel this transaction?")) {
          sessionStorage.removeItem("pendingTransaction");
          window.location = "/dashboard";
        }
      }
      
      function escapeHtml(s) {
        if (!s) return "";
        return s.replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }
      
      loadTransaction();
    </script>
  </body>
</html>
