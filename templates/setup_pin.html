<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Setup PIN - Zoro Pay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: radial-gradient(circle at 30% 20%, #0a0a0f, #000);
            font-family: "Inter", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .setup-container {
            max-width: 450px;
            width: 100%;
            background: rgba(18, 18, 28, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            padding: 2rem;
            text-align: center;
            border: 1px solid rgba(79, 70, 229, 0.4);
        }
        .logo-icon { font-size: 3rem; color: #4f46e5; margin-bottom: 1rem; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: white; }
        .sub { color: #9ca3af; font-size: 0.8rem; margin-bottom: 2rem; }
        .pin-type-selector {
            display: flex;
            gap: 12px;
            background: #0f0f17;
            padding: 6px;
            border-radius: 60px;
            margin-bottom: 2rem;
        }
        .pin-type-btn {
            flex: 1;
            padding: 12px;
            border-radius: 50px;
            background: transparent;
            border: none;
            color: #9ca3af;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .pin-type-btn.active { background: #4f46e5; color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4); }
        .pin-dots { display: flex; justify-content: center; gap: 16px; margin-bottom: 2rem; }
        .pin-dot {
            width: 16px;
            height: 16px;
            background: #2d2d44;
            border-radius: 50%;
            transition: 0.2s;
        }
        .pin-dot.filled { background: #4f46e5; transform: scale(1.2); box-shadow: 0 0 8px #4f46e5; }
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 1.5rem;
        }
        .keypad-btn {
            background: #1e1e2c;
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.1s;
        }
        .keypad-btn:active { background: #4f46e5; transform: scale(0.96); }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(95deg, #4f46e5, #6366f1);
            border: none;
            border-radius: 2rem;
            font-weight: 700;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid #4f46e5;
            border-radius: 2rem;
            font-weight: 700;
            color: #a5b4fc;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }
        .biometric-setup {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #2d2d44;
        }
        .biometric-btn {
            background: rgba(79, 70, 229, 0.2);
            border: 1px solid #4f46e5;
            padding: 12px;
            border-radius: 2rem;
            font-weight: 600;
            color: #a5b4fc;
            font-size: 0.9rem;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .biometric-btn:active { transform: scale(0.98); }
        .strength-indicator { margin-top: 1rem; font-size: 0.7rem; }
        .strength-weak { color: #f43f5e; }
        .strength-medium { color: #fbbf24; }
        .strength-strong { color: #10b981; }
        .skip-link {
            color: #6b7280;
            font-size: 0.75rem;
            text-decoration: none;
            display: block;
            margin-top: 0.75rem;
            cursor: pointer;
        }
        .toast-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e2c;
            backdrop-filter: blur(12px);
            border-left: 4px solid #4f46e5;
            padding: 12px 22px;
            border-radius: 60px;
            font-size: 0.85rem;
            color: #f1f5f9;
            box-shadow: 0 8px 20px black;
            z-index: 1000;
            animation: slideUp 0.25s ease;
        }
        .toast-message.error {
            border-left-color: #f43f5e;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px) translateX(-50%);
            }
            to {
                opacity: 1;
                transform: translateY(0) translateX(-50%);
            }
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
        <h1>Set Transaction PIN</h1>
        <p class="sub">Secure your account with a PIN</p>

        <div class="pin-type-selector">
            <button class="pin-type-btn active" data-length="4">4-Digit PIN</button>
            <button class="pin-type-btn" data-length="6">6-Digit PIN</button>
        </div>

        <div class="pin-dots" id="pinDots"></div>
        <div class="keypad" id="keypad"></div>
        <button id="confirmBtn" class="btn-primary" disabled>Confirm PIN</button>
        <div id="strengthMsg" class="strength-indicator"></div>
        
        <div class="biometric-setup" id="biometricSection" style="display: none;">
            <button id="biometricSetupBtn" class="biometric-btn">
                <i class="fas fa-fingerprint"></i> Set up Biometric Login
            </button>
            <a href="#" id="skipBiometric" class="skip-link">Skip for now</a>
        </div>
    </div>

    <script>
        let selectedLength = 4;
        let currentPin = "";
        let pinSet = false;

        function showToast(message, isError = false) {
            const toast = document.createElement("div");
            toast.className = "toast-message" + (isError ? " error" : "");
            toast.innerHTML = (isError ? '❌ ' : '✅ ') + message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function initUI() {
            const dotsDiv = document.getElementById("pinDots");
            dotsDiv.innerHTML = "";
            for (let i = 0; i < selectedLength; i++)
                dotsDiv.innerHTML += '<div class="pin-dot"></div>';
            generateKeypad();
            updateStrength();
            
            // Check if biometric is supported
            await checkBiometricSupport();
        }

        async function checkBiometricSupport() {
            try {
                const isSupported = window.PublicKeyCredential && 
                    await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
                
                const biometricSection = document.getElementById("biometricSection");
                if (isSupported && !pinSet) {
                    biometricSection.style.display = "block";
                } else {
                    biometricSection.style.display = "none";
                }
            } catch (e) {
                console.log("Biometric check failed:", e);
                document.getElementById("biometricSection").style.display = "none";
            }
        }

        function generateKeypad() {
            const keys = ["1", "2", "3", "4", "5", "6", "7", "8", "9", 
                         '<i class="fas fa-backspace"></i>', "0", '<i class="fas fa-check"></i>'];
            const pad = document.getElementById("keypad");
            pad.innerHTML = "";
            keys.forEach((k) => {
                const btn = document.createElement("button");
                btn.className = "keypad-btn";
                btn.innerHTML = k;
                btn.onclick = () => handleKey(k);
                pad.appendChild(btn);
            });
        }

        function handleKey(val) {
            if (val === '<i class="fas fa-backspace"></i>') {
                currentPin = currentPin.slice(0, -1);
                updateDots();
            } else if (val === '<i class="fas fa-check"></i>') {
                if (currentPin.length === selectedLength) confirmPin();
            } else if (currentPin.length < selectedLength) {
                currentPin += val;
                updateDots();
            }
            document.getElementById("confirmBtn").disabled = currentPin.length !== selectedLength;
            updateStrength();
        }

        function updateDots() {
            const dots = document.querySelectorAll(".pin-dot");
            for (let i = 0; i < dots.length; i++) {
                if (i < currentPin.length) dots[i].classList.add("filled");
                else dots[i].classList.remove("filled");
            }
        }

        function updateStrength() {
            const msgDiv = document.getElementById("strengthMsg");
            if (currentPin.length === 0) {
                msgDiv.innerHTML = "";
                return;
            }
            const isWeak = /^(\d)\1+$/.test(currentPin);
            const isSeq = "1234,2345,3456,4567,5678,6789,0123,123456,234567,345678,456789".includes(currentPin);
            if (isWeak || isSeq)
                msgDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Weak PIN - avoid repeated or sequential digits';
            else if (currentPin.length === selectedLength)
                msgDiv.innerHTML = '<i class="fas fa-check-circle"></i> PIN looks good!';
            else msgDiv.innerHTML = "";
            msgDiv.className = "strength-indicator " + (isWeak || isSeq ? "strength-weak" : "strength-strong");
        }

        async function confirmPin() {
            const btn = document.getElementById("confirmBtn");
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Setting up...';
            try {
                const res = await fetch("/api/setup_pin", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        pin: currentPin,
                        pin_type: selectedLength.toString(),
                    }),
                });
                const data = await res.json();
                if (res.ok) {
                    pinSet = true;
                    showToast("PIN setup successful!", false);
                    
                    // Check if biometric is supported
                    const isSupported = window.PublicKeyCredential && 
                        await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
                    
                    if (isSupported) {
                        // Show biometric option but don't auto-redirect
                        const biometricSection = document.getElementById("biometricSection");
                        biometricSection.style.display = "block";
                        btn.innerHTML = "PIN Confirmed ✓";
                        btn.disabled = true;
                        
                        // Remove existing continue button if any
                        const existingBtn = document.getElementById("continueDashboardBtn");
                        if (existingBtn) existingBtn.remove();
                        
                        // Add a manual continue button
                        const continueBtn = document.createElement("button");
                        continueBtn.id = "continueDashboardBtn";
                        continueBtn.className = "btn-secondary";
                        continueBtn.innerHTML = '<i class="fas fa-arrow-right"></i> Continue to Dashboard';
                        continueBtn.onclick = () => {
                            window.location.href = "/dashboard";
                        };
                        btn.parentNode.insertBefore(continueBtn, btn.nextSibling);
                    } else {
                        // No biometric support, redirect immediately
                        window.location.href = "/dashboard";
                    }
                } else {
                    showToast(data.error || "Setup failed", true);
                    resetPin();
                }
            } catch (e) {
                console.error("PIN setup error:", e);
                showToast("Network error. Please try again.", true);
                resetPin();
            }
            btn.disabled = false;
            btn.innerHTML = "Confirm PIN";
        }

        async function setupBiometric() {
            if (!window.PublicKeyCredential) {
                showToast("Biometric authentication is not supported on this device", true);
                return;
            }

            const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
            if (!available) {
                showToast("Please set up fingerprint/face unlock on your device first", true);
                return;
            }

            const biometricBtn = document.getElementById("biometricSetupBtn");
            biometricBtn.disabled = true;
            biometricBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Setting up...';

            try {
                const challenge = new Uint8Array(32);
                crypto.getRandomValues(challenge);

                // Get user info from session
                const userRes = await fetch("/api/user");
                const userData = await userRes.json();
                
                const publicKeyCredentialCreationOptions = {
                    challenge: challenge,
                    rp: { name: "Zoro Pay", id: window.location.hostname },
                    user: {
                        id: new TextEncoder().encode(userData.id.toString()),
                        name: userData.phone || "user@zoropay.com",
                        displayName: userData.name || "Zoro Pay User",
                    },
                    pubKeyCredParams: [
                        { type: "public-key", alg: -7 },  // ES256
                        { type: "public-key", alg: -257 } // RS256
                    ],
                    authenticatorSelection: {
                        authenticatorAttachment: "platform",
                        userVerification: "required",
                        residentKey: "preferred"
                    },
                    timeout: 60000,
                    attestation: "none"
                };

                const credential = await navigator.credentials.create({
                    publicKey: publicKeyCredentialCreationOptions
                });

                if (credential) {
                    const registrationData = {
                        phone: userData.phone,
                        credential_id: btoa(String.fromCharCode(...new Uint8Array(credential.rawId))),
                        public_key: btoa(String.fromCharCode(...new Uint8Array(credential.response.getPublicKey()))),
                        device_name: navigator.platform || "WebAuthn Device"
                    };

                    const res = await fetch("/api/biometric/register", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(registrationData),
                    });

                    const data = await res.json();
                    if (res.ok) {
                        showToast("Biometric login setup successful!", false);
                        // Redirect to dashboard after successful biometric setup
                        window.location.href = "/dashboard";
                    } else {
                        showToast(data.error || "Biometric registration failed", true);
                        biometricBtn.disabled = false;
                        biometricBtn.innerHTML = '<i class="fas fa-fingerprint"></i> Set up Biometric Login';
                    }
                }
            } catch (err) {
                console.error("Biometric setup error:", err);
                if (err.name === "NotAllowedError") {
                    showToast("Biometric setup was cancelled", true);
                } else {
                    showToast("Biometric setup failed: " + err.message, true);
                }
                biometricBtn.disabled = false;
                biometricBtn.innerHTML = '<i class="fas fa-fingerprint"></i> Set up Biometric Login';
            }
        }

        function resetPin() {
            currentPin = "";
            updateDots();
            document.getElementById("confirmBtn").disabled = true;
            // Remove continue button if exists
            const continueBtn = document.getElementById("continueDashboardBtn");
            if (continueBtn) continueBtn.remove();
        }

        function redirectToDashboard() {
            window.location.href = "/dashboard";
        }

        document.querySelectorAll(".pin-type-btn").forEach((btn) => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".pin-type-btn").forEach((b) => b.classList.remove("active"));
                btn.classList.add("active");
                selectedLength = parseInt(btn.dataset.length);
                currentPin = "";
                initUI();
                document.getElementById("confirmBtn").disabled = true;
            });
        });

        document.getElementById("biometricSetupBtn")?.addEventListener("click", setupBiometric);
        document.getElementById("skipBiometric")?.addEventListener("click", (e) => {
            e.preventDefault();
            redirectToDashboard();
        });

        initUI();
    </script>
</body>
</html>
