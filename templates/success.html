<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Success - Zoro Pay</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: radial-gradient(circle at 30% 20%, #0a0f1a, #000000);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .success-card {
        max-width: 450px;
        width: 100%;
        background: rgba(18, 18, 28, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 2rem;
        padding: 1.8rem;
        text-align: center;
        border: 1px solid rgba(79, 70, 229, 0.4);
        animation: floatIn 0.5s ease-out;
        box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.5);
      }
      @keyframes floatIn {
        0% {
          opacity: 0;
          transform: scale(0.95) translateY(20px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      .checkmark {
        width: 80px;
        height: 80px;
        background: linear-gradient(145deg, #10b981, #059669);
        margin: 0 auto 1rem;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: pop 0.4s ease-out;
      }
      .checkmark i {
        font-size: 2.5rem;
        color: white;
      }
      @keyframes pop {
        0% {
          transform: scale(0.2);
          opacity: 0;
        }
        80% {
          transform: scale(1.1);
        }
        100% {
          transform: scale(1);
        }
      }
      h1 {
        font-size: 1.5rem;
        color: #ffffff;
        margin-bottom: 4px;
      }
      .subtitle {
        color: #9ca3af;
        font-size: 0.85rem;
        margin-bottom: 1rem;
      }
      .amount-large {
        font-size: 2.2rem;
        font-weight: 800;
        background: linear-gradient(135deg, #ffffff, #a78bfa);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin: 12px 0;
      }
      .details-card {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 1rem;
        padding: 1rem;
        margin: 1rem 0;
        text-align: left;
      }
      .detail-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .detail-row:last-child {
        border-bottom: none;
      }
      .detail-label {
        color: #9ca3af;
        font-size: 0.8rem;
        font-weight: 500;
      }
      .detail-value {
        color: #ffffff;
        font-weight: 600;
        font-size: 0.85rem;
        word-break: break-word;
        text-align: right;
        max-width: 60%;
      }
      .cashback-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(245, 158, 11, 0.15);
        padding: 6px 14px;
        border-radius: 30px;
        margin: 12px 0;
        color: #fbbf24;
        font-size: 0.8rem;
        font-weight: 500;
      }
      .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 1.2rem;
      }
      .btn {
        flex: 1;
        padding: 12px;
        border-radius: 1.5rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        background: #1e1e2c;
        color: white;
        transition: all 0.2s;
        font-size: 0.85rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .btn:hover {
        transform: translateY(-1px);
        filter: brightness(1.05);
      }
      .btn-primary {
        background: linear-gradient(95deg, #4f46e5, #6366f1);
      }
      .btn-share {
        background: linear-gradient(95deg, #3b82f6, #2563eb);
      }
      .toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #1e1e2c;
        color: white;
        padding: 8px 18px;
        border-radius: 40px;
        font-size: 0.8rem;
        z-index: 2000;
        border: 1px solid #4f46e5;
        animation: fadeInUp 0.3s ease;
        white-space: nowrap;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }
      @media (max-width: 480px) {
        .success-card {
          padding: 1.2rem;
        }
        .btn-group {
          flex-wrap: wrap;
        }
        .amount-large {
          font-size: 1.8rem;
        }
        .detail-value {
          font-size: 0.75rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="success-card">
      <div class="checkmark"><i class="fas fa-check"></i></div>
      <h1>Payment Sent!</h1>
      <div class="subtitle">Transaction completed</div>
      <div class="amount-large" id="amountDisplay">₹0.00</div>
      
      <div class="details-card">
        <div class="detail-row">
          <span class="detail-label"><i class="fas fa-user"></i> To</span>
          <span class="detail-value" id="recipientDisplay">-</span>
        </div>
        <div class="detail-row">
          <span class="detail-label"><i class="fas fa-hashtag"></i> TXN ID</span>
          <span class="detail-value" id="txnId">-</span>
        </div>
        <div class="detail-row">
          <span class="detail-label"><i class="far fa-calendar"></i> Date</span>
          <span class="detail-value" id="dateTime">-</span>
        </div>
        <div class="detail-row" id="noteRow" style="display: none;">
          <span class="detail-label"><i class="fas fa-sticky-note"></i> Note</span>
          <span class="detail-value" id="noteDisplay">-</span>
        </div>
      </div>
      
      <div id="cashbackContainer"></div>
      
      <div class="btn-group">
        <button class="btn" onclick="goToDashboard()">
          <i class="fas fa-home"></i> Home
        </button>
        <button class="btn btn-primary" onclick="downloadReceipt()">
          <i class="fas fa-download"></i> Receipt
        </button>
        <button class="btn btn-share" onclick="shareTransaction()">
          <i class="fas fa-share-alt"></i> Share
        </button>
      </div>
    </div>

    <script>
      // Get transaction data
      let meta = {};
      let pending = {};
      
      try {
        const storedMeta = sessionStorage.getItem("lastSuccessMeta");
        if (storedMeta && storedMeta !== "undefined") {
          meta = JSON.parse(storedMeta);
        }
        const storedPending = sessionStorage.getItem("pendingTransaction");
        if (storedPending && storedPending !== "undefined") {
          pending = JSON.parse(storedPending);
        }
      } catch (e) {}
      
      const amount = meta.amount || pending.amount || 0;
      const recipient = meta.recipient || pending.identifier || "User";
      const transactionId = meta.transaction_id || "TXN" + Date.now().toString().slice(-8);
      const note = meta.note || pending.note || "";
      const cashback = meta.cashback || 0;
      
      const now = new Date();
      const formattedDate = now.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }) + ', ' + 
                           now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
      
      // Update UI
      document.getElementById("amountDisplay").innerHTML = `₹${parseFloat(amount).toFixed(2)}`;
      document.getElementById("recipientDisplay").innerText = recipient.length > 25 ? recipient.slice(0, 22) + '...' : recipient;
      document.getElementById("txnId").innerText = transactionId;
      document.getElementById("dateTime").innerText = formattedDate;
      
      if (note && note.trim()) {
        document.getElementById("noteRow").style.display = "flex";
        document.getElementById("noteDisplay").innerText = note.length > 30 ? note.slice(0, 27) + '...' : note;
      }
      
      if (cashback && cashback > 0) {
        document.getElementById("cashbackContainer").innerHTML = `
          <div class="cashback-badge">
            <i class="fas fa-gift"></i> +₹${parseFloat(cashback).toFixed(2)} cashback earned!
          </div>
        `;
      }
      
      // Compact share message (cashback line removed as requested)
      function getShareMessage() {
        let msg = `💰 ZORO PAY\n`;
        msg += `━━━━━━━━━━━━━━━━\n`;
        msg += `Amount: ₹${parseFloat(amount).toFixed(2)}\n`;
        msg += `To: ${recipient}\n`;
        msg += `ID: ${transactionId}\n`;
        msg += `📅 ${formattedDate}\n`;
        if (note && note.trim()) {
          msg += `Note: ${note.substring(0, 40)}\n`;
        }
        msg += `━━━━━━━━━━━━━━━━\n`;
        msg += `Thank you for using Zoro Pay!`;
        return msg;
      }
      
      async function shareTransaction() {
        const message = getShareMessage();
        
        // Try native share on mobile
        if (navigator.share) {
          try {
            await navigator.share({
              title: 'Zoro Pay Receipt',
              text: message,
            });
            return;
          } catch (e) {
            // User cancelled or error, fallback to copy
          }
        }
        
        // Fallback: copy to clipboard
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(message);
          showToast("📋 Copied! Paste anywhere to share");
        } else {
          // Legacy fallback
          const textarea = document.createElement('textarea');
          textarea.value = message;
          textarea.style.position = 'fixed';
          textarea.style.top = '-9999px';
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
          showToast("📋 Copied to clipboard!");
        }
      }
      
      function showToast(msg) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
        document.body.appendChild(toast);
        
        setTimeout(() => {
          toast.style.opacity = '0';
          setTimeout(() => toast.remove(), 300);
        }, 2500);
      }
      
      function downloadReceipt() {
        if (meta.transaction_id && meta.transaction_id !== transactionId) {
          window.location.href = `/api/download_receipt/${meta.transaction_id}`;
        } else {
          // Simple text receipt
          const content = getShareMessage();
          const blob = new Blob([content], { type: 'text/plain' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `receipt_${transactionId}.txt`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          showToast("📄 Receipt saved");
        }
      }
      
      function goToDashboard() {
        window.location.href = '/dashboard';
      }
      
      // Confetti
      function confetti() {
        const colors = ['#10b981', '#4f46e5', '#f59e0b', '#3b82f6'];
        for (let i = 0; i < 60; i++) {
          const conf = document.createElement('div');
          conf.style.position = 'fixed';
          conf.style.width = Math.random() * 8 + 3 + 'px';
          conf.style.height = conf.style.width;
          conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          conf.style.left = Math.random() * 100 + '%';
          conf.style.top = '-10px';
          conf.style.borderRadius = Math.random() > 0.6 ? '50%' : '0';
          conf.style.pointerEvents = 'none';
          conf.style.zIndex = '9999';
          conf.style.opacity = Math.random() * 0.7 + 0.3;
          conf.style.animation = `fall ${Math.random() * 2 + 1}s linear forwards`;
          document.body.appendChild(conf);
          setTimeout(() => conf.remove(), 2000);
        }
      }
      
      const style = document.createElement('style');
      style.textContent = `@keyframes fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(360deg); opacity: 0; } }`;
      document.head.appendChild(style);
      
      confetti();
      sessionStorage.removeItem("pendingTransaction");
      setTimeout(() => sessionStorage.removeItem("lastSuccessMeta"), 20000);
      
      // Keyboard shortcut: Ctrl+S to share
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
          e.preventDefault();
          shareTransaction();
        }
      });
    </script>
  </body>
</html>
